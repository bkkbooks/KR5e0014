front:
  text: 二經同卷母二
  hash: sha256:d200eaab365b5e44fbd9593991ed73db9cdce76f920d2ae93816d1f422f5b1ed
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0014_HFL_000-001a, image: hfl/0758/0758-040.png}
body:
  text: 太上洞玄靈寳八仙王教誡經太上洞玄靈寳國王行道經洞玄靈寳八仙王教誡經道言左右中真結形之始分於元始无上大道應化之氣孕靈瓊胎九萬大劫幽閑寥寂九萬劫後法當應世結形理炁出於瓊胎出胎之時九天雷震九地開裂舉步之初登天寳花身出金光猶如初日二晨俠照晶彩曜眸背有斗星心前日像緑髮駢齒紫氣連霄所在之處七素之雲晨夕蔭蓋隱龍圓蓮以爲牀座天燈天燭照明雲路天樂天梵萬音齊鼓龍鳳撫節謡歌太平邕邕和雅晃曜耳目甘泉甘井飲之愈疾形如金玉无有衰老无爲和化經九萬劫爾時三真化作嬰童託附真母已漸長大隨世成立无上大道元始天尊授此三真號曰至孝真王治化中國傍攝四夷有生之類咸來受事教其慈孝敬天順地守一寳形憐愍萬物三千三百年後又更改新所謂淘汰滓穢水火冶鍊是時三真孝王一治日中二治月中三治斗中上持三辰晶曜幽夜玄治三氣㝠適空有應變倏忽不待呼召如形出影不由憶想雖處上界道適下土无上无下无邊无際隨方設教拔諸異類與其同好心无疑悮孝心高遠神力无比回天轉地制御隂陽賒促運度驅役千靈感動祥瑞无翼而飛瞬息九萬屈伸之頃已周萬天皆由至孝慈順二親憐愍一切種植之類孝道慈悲好生惡殺食肉飲酒非孝道也男女穢慢非孝道也胎産尸敗非孝道也毁傷流血非孝道也偷劫竊盜非孝道也好習不善講論惡事非孝道也樂處穢賤内外流汙心形踈懶不修生道信心不篤輕浮頗好隨事放逐守一不慧心氣離散生老病死種種煩惱死入地獄窮劫受苦永无出期原乎因縁失吾孝道得種種苦下世男女修吾孝道與道同德既同德已與道同光既同光已與道同真既同真已與道同身既同身已與道同神既同神已與道同變既同變已與道同壽既同壽已與道同有既同有已與道同无既同无已无處不无无處不有亦无處不有无處不无寂寥虚豁无處不有隨心應變或爲帝王或爲忠巨或爲賢人或爲孝子或爲道士或爲國師或棲寒林清齋苦行誦經念道建功立德或爲良將不戰而勝或積穀帛濟惠饑寒或作明師决諸疾疫種種利益一切有生或下燈燭照明積夜或促萬劫以爲一劫或延一劫以爲百劫或一毫端而昇大地或一毛孔盛九大河及已四海不撓物性不覺不知或引十方世界昇一針鋒來對目前有生之類皆見三真光氣法身種種說法各得悟解奉吾孝道能入不思議處能爲不思議事失吾孝道救苦不暇生死相續不可思議奉吾孝道得无畏果第一離生死怖畏得不生不死果第二離暗障怖畏得光明果晝明神光夜照天燈久則身光光无晝夜第三離飢寒怖畏得天厨天衣果第四離衆試怖畏一切魔王及諸猛獸皆來受事而爲侍衛第五離有形怖畏得入无形果入无形果者非滅生而无形耶即此凡身得成道身身同光氣昇入无形同於虚空故謂之得无形果高下自任聚散隨心有无在意不待身心而所爲也孝治天下不勞法令孝治其身志性堅正孝治百病天爲醫之孝治萬物衆毒不害孝治山川草木不枯孝營生業田蠶萬倍孝至於天風雨以時孝至於地萬類安靜神芝靈术處處呈瑞孝至禽獸龍麟鸞鳳翔集境内孝至淵澤河侯獻珠魚龍涌躍靜息波浪但孝二親元元大恩天地萬靈晨夕侍衛行道守一自然得道孝道至大與元並生治於三光照曜幽夜有生之類恃賴无窮爾時靈童稽首敢問天尊下世生人又有不幸早喪二親孝心何申答曰敬天順地朝禮三光如孝父母无有異也成道益速所願從心又順地者順於王氣朝禮五嶽大小便利不忤太歲順於四時修日新道期於八節請生謝罪内外芳潔披心露膽誠香自熏洗滌流穢精而復精猶嫌不精真而彌真猶嫌不真不真爲真求吾真道邪魅應之卒至退敗生入邪道魂魄被執癲狂惑亂自製一法敗賣道要以求利用贓滿罪積生身被考種種苦惱死入地獄遍遭湯炭永无出期縱得出世生墮六畜不如意中或生下賤盲聾瘖瘂手足不具永不見道永不聞法爲諸人畜之所擯觸飢寒困苦性命危脆一失大道長淪惡趣不可思議道言有德之人孝心高遠道合天地故天不能殺道不可滅故地不能埋如埋瓊霜終成舍利不可毁壞上天入地无所滯礙往昔有人不識大道貪生畏死晨夕正念朝禮枯樹以求不死積四十年大道愍之勤苦不懈救其道氣如是枯樹一旦榮華此人歡喜彌加精進採服其華身遂得道修道之士取於不懈積功累德心行日新神燈神香神光神通是道之信建志不已道來降之教其真要定不虚也道言下世邪俗覩道幽驗因以求用規他施財入己私費爲邪所中終不得道慳貪不捨失慈悲道无孝順心爲利奉道益其詐僞詐僞之罪天地不赦學道之士莫與共處應須訶責舉其過咎擯出治罪勿許詐悔更次道流收其贓賄以給貧病不得穢財以營神功道言孝治堂宇裝嚴精舍无令穿敗流俗士女卑賤熏臭瘡疣垢穢酒色喪産食啖魚肉茹葷辛者永絶攸往勿相親近勿理齋厨道言後有十惡五逆不孝隂賊誹謗毁訾破敗善道嫉妬驕慢貪婬嗜酒好啖魚肉田獵捕殺偷盜劫賊遵奉邪道心无慈孝志不平等捨貧親富喜好嘲調情愛戰鬥習畜器仗无忍辱心利己傷物孝道所忌人畜所畏不合聞道應須遠避勿相親近无上大道說此教誡爲下世明王孝治天下爲諸孝子報父母恩軌則家國使天下太平八表歸一咸遵至孝有得之者晨夕誦持不簡男女无論貴賤皆令尋誦以答二親元元大恩說此經時天現神燈處處明朗天鍾天磬天梵天樂空中自鼓天香天花隨風流轉家國人人供養是經思其義趣奉行其事傍勸未聞有用之者應精紙筆疏潔沐浴燌香抄寫千卷百卷流通供養香燈不絶心无懈倦必得成道不可思議洞玄靈寳八仙王教誡經
